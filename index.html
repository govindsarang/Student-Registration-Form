<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration Form</title>
</head>

<body>

  <h1>Student Registration Form</h1>

  <form action="#" method="POST">

    <!-- ==================== 1. Student Details ==================== -->
    <div>
      <h3>Student Details</h3>

      <div>
        <label for="fullName">Full Name:</label><br />
        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required />
      </div>
      <br />

      <div>
        <label for="email">Email Address:</label><br />
        <input type="email" id="email" name="email" placeholder="example@email.com" required />
      </div>
      <br />

      <div>
        <label for="password">Password:</label><br />
        <input type="password" id="password" name="password" placeholder="Create a password" minlength="8" required />
      </div>
      <br />

      <div>
        <label for="phone">Phone Number:</label><br />
        <input type="tel" id="phone" name="phone" placeholder="+91 9876543210" pattern="[0-9+\-\s]{7,15}" required />
      </div>
      <br />

      <div>
        <label for="dob">Date of Birth:</label><br />
        <input type="date" id="dob" name="dob" required />
      </div>
    </div>

    <br />

    <!-- ==================== 2. Gender Selection ==================== -->
    <div>
      <h3>Gender</h3>

      <label><input type="radio" name="gender" value="male" required /> Male</label>
      &nbsp;&nbsp;
      <label><input type="radio" name="gender" value="female" /> Female</label>
      &nbsp;&nbsp;
      <label><input type="radio" name="gender" value="non-binary" /> Non-Binary</label>
      &nbsp;&nbsp;
      <label><input type="radio" name="gender" value="prefer-not-to-say" /> Prefer not to say</label>
    </div>

    <br />

    <!-- ==================== 3. Course Selection ==================== -->
    <div>
      <h3>Course Selection</h3>

      <label for="course">Select Your Course:</label><br />
      <select id="course" name="course" required>
        <option value="">-- Choose a Course --</option>
        <option value="bsc-cs">B.Sc. Computer Science</option>
        <option value="btech">B.Tech (Engineering)</option>
        <option value="bba">BBA (Business Administration)</option>
        <option value="bcom">B.Com (Commerce)</option>
        <option value="ba">B.A. (Arts)</option>
        <option value="msc-cs">M.Sc. Computer Science</option>
        <option value="mba">MBA</option>
        <option value="phd">Ph.D.</option>
      </select>
    </div>

    <br />

    <!-- ==================== 4. Skills / Interests ==================== -->
    <div>
      <h3>Skills / Interests</h3>
      <p>Select all that apply:</p>

      <label><input type="checkbox" name="skills" value="web-development" /> Web Development</label><br />
      <label><input type="checkbox" name="skills" value="data-science" /> Data Science</label><br />
      <label><input type="checkbox" name="skills" value="machine-learning" /> Machine Learning / AI</label><br />
      <label><input type="checkbox" name="skills" value="cybersecurity" /> Cybersecurity</label><br />
      <label><input type="checkbox" name="skills" value="design" /> Graphic Design / UI-UX</label><br />
      <label><input type="checkbox" name="skills" value="mobile-dev" /> Mobile App Development</label><br />
      <label><input type="checkbox" name="skills" value="cloud" /> Cloud Computing</label>
    </div>

    <br />

    <!-- ==================== 5. Address ==================== -->
    <div>
      <h3>Address</h3>

      <label for="address">Full Address:</label><br />
      <textarea
        id="address"
        name="address"
        rows="4"
        cols="50"
        placeholder="House No., Street, City, State, PIN Code, Country"
        required
      ></textarea>
    </div>

    <br />

    <!-- ==================== 6. File Upload ==================== -->
    <div>
      <h3>Student Photo</h3>

      <label for="photo">Upload Your Photo (JPG / PNG, max 2MB):</label><br />
      <input type="file" id="photo" name="photo" accept="image/jpeg, image/png" required />
    </div>

    <br />

    <!-- ==================== 7. Terms & Conditions ==================== -->
    <div>
      <h3>Terms &amp; Conditions</h3>

      <label>
        <input type="checkbox" name="terms" value="agreed" required />
        I have read and agree to the
        <a href="#" target="_blank">Terms &amp; Conditions</a>
        and <a href="#" target="_blank">Privacy Policy</a>.
      </label>
    </div>

    <br />

    <!-- ==================== 8. Buttons ==================== -->
    <div>
      <button type="submit">Submit Registration</button>
      &nbsp;&nbsp;
      <button type="reset">Reset Form</button>
    </div>

  </form>

</body>

</html>
